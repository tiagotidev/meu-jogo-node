<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age of War - Simulador</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; padding-top: 50px; }
        .painel { background: #333; padding: 20px; border-radius: 10px; display: inline-block; min-width: 300px; }
        .status { font-size: 1.2rem; margin: 10px 0; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; margin: 5px; border: none; border-radius: 5px; }
        .btn-lutar { background: #ff4757; color: white; }
        .btn-curar { background: #2ed573; color: white; }
        .btn-reset { background: #ffa502; color: white; }
    </style>
</head>
<body>

    <h1>Age of War - Evolução</h1>

    <div class="painel">
        <div class="status">Era: <span id="era">Idade da Pedra</span></div>
        <div class="status">XP: <span id="xp">0</span></div>
        <div class="status">Vida: <span id="vida">100</span>%</div>
        
        <hr>

        <button class="btn-lutar" onclick="acaoDoJogo('lutar')">Lutar (-15 Vida / +50 XP)</button>
        <button class="btn-curar" onclick="acaoDoJogo('descansar')">Descansar (+20 Vida)</button>
        <br><br>
        <button class="btn-reset" id="btnReset">Resetar Save</button>
    </div>

    <script>
        // Função principal que se comunica com o Servidor Node
        async function acaoDoJogo(tipo) {
            try {
                // Usamos apenas /tipo para o Render entender que é no próprio servidor
                const response = await fetch(`/${tipo}`);
                const dados = await response.json();

                // Atualiza a tela com os dados que vieram do servidor
                document.getElementById('era').innerText = dados.era;
                document.getElementById('xp').innerText = dados.xp;
                document.getElementById('vida').innerText = dados.vida;

                if(dados.vida <= 0) {
                    alert("Você morreu! Resetando...");
                    acaoDoJogo('reset');
                }
            } catch (error) {
                console.error("Erro ao conectar com o servidor:", error);
            }
        }

        // Evento para o botão de Reset
        document.getElementById('btnReset').addEventListener('click', () => {
            if (confirm("Tem certeza que deseja apagar seu progresso?")) {
                acaoDoJogo('reset');
            }
        });

        // Carrega o status assim que a página abre
        window.onload = () => acaoDoJogo('status');
    </script>
</body>
</html>
